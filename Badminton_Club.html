<!DOCTYPE html PUBLIC "-//W3C//DTD XHTML 1.0 Transitional//EN" "http://www.w3.org/TR/xhtml1/DTD/xhtml1-transitional.dtd">
<html xmlns="http://www.w3.org/1999/xhtml">
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>APU Badminton Club | IA project</title>
<link rel="icon" href="logo.jpg" type="image/svg+xml">
<style>
    body { font-family: Arial, sans-serif; background:#111; color:#fff; display:flex; justify-content:center; align-items:center; min-height:100vh; margin:0; padding: 20px; box-sizing: border-box; }
    .hero { text-align:center; }
    .line { font-size:2rem; margin-bottom:0.5rem; }
    .typed { color:#0ff; border-right:2px solid #0ff; padding-right:5px; animation: blink 0.8s steps(1) infinite; }
    @keyframes blink { 50% { border-color: transparent; } }

    /* Responsive adjustments */
    @media (max-width: 768px) {
        body { flex-direction: column; padding: 10px; }
        .line { font-size: 1.5rem; }
    }

    @media (max-width: 480px) {
        .line { font-size: 1.2rem; }
    }
  </style>
</style>
</head>
<body>
    <img src="logo.jpg" alt="APU Badminton Club Logo" width="200" height="200" style="position: absolute; top: 20px; left: 20px;">
    <div class="hero">
    <div class="line" style="position: absolute; top: 100px; right: 50px; transform: translateX(-50%);">Welcome to APU badminton club, </div>
    <div class="line"><span id="typed" class="typed"></span></div>
</div>

  <script>
    const words = ["Smash Harder.", "Ace the Game.", "Unite & Play.", "Badminton Legends."];
    const typedEl = document.getElementById("typed");
    let i = 0, char = 0, forward = true;

    function typeLoop() {
      const word = words[i];
      if (forward) {
        typedEl.textContent = word.slice(0, ++char);
        if (char === word.length) {
          forward = false;
          setTimeout(typeLoop, 1400); // pause on full word
          return;
        }
      } else {
        typedEl.textContent = word.slice(0, --char);
        if (char === 0) {
          forward = true;
          i = (i + 1) % words.length;
        }
      }
      setTimeout(typeLoop, forward ? 120 : 80);
    }
    typeLoop();
  </script>


</body>
</html>
